[build]
  command = "pnpm build:ssg"
  publish = "dist"
  functions = "server"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["nodemailer"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/index/api/:splat"
  status = 200

# Domain canonicalization: Enforce https://cuongthonggio.com (non-www, HTTPS)
# For www and HTTP redirects, configure in Netlify dashboard under Domain settings > Redirects & HTTPS
# or use Netlify's "Custom domain" alias management for permanent redirects.

# SPA fallback — only applies if no pre-rendered file exists
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

