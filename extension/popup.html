<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>OpenAI Token Interceptor</title>
<style>
  :root {
    --bg:#0a0e1a; --s:#111827; --s2:#1a2235; --bd:#1e3a5f;
    --ac:#00d4ff; --g2:#10b981; --g3:#f59e0b; --er:#ef4444;
    --tx:#e2e8f0; --dim:#64748b; --br:#f1f5f9;
    --glow:rgba(0,212,255,.15);
    --mono:'Cascadia Code','Consolas',monospace; --sans:'Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:500px;min-height:560px;background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:13px}
  body::before{content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);
    background-size:24px 24px;pointer-events:none;z-index:0}
  .app{position:relative;z-index:1}

  .hdr{padding:14px 18px 12px;border-bottom:1px solid var(--bd);
    background:linear-gradient(135deg,#0f172a,var(--bg));position:relative;overflow:hidden}
  .hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--ac),transparent);
    animation:scan 3s linear infinite}
  @keyframes scan{0%{transform:scaleX(0);transform-origin:left}50%{transform:scaleX(1)}
    100%{transform:scaleX(0);transform-origin:right}}
  .hdr-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .logo{width:26px;height:26px;background:linear-gradient(135deg,var(--ac),#0077ff);
    border-radius:7px;display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:700;color:#000;box-shadow:0 0 10px var(--glow);flex-shrink:0}
  .ttl{font-size:14px;font-weight:700;color:var(--br)}
  .badge{margin-left:auto;display:flex;align-items:center;gap:5px;
    background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);
    color:var(--g2);border-radius:20px;padding:2px 10px;font-size:11px;font-family:var(--mono)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--g2);animation:pu 2s ease-in-out infinite}
  @keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
  .sub{font-size:10px;color:var(--dim);margin-left:36px;font-family:var(--mono)}

  .auth-wrap{padding:14px 16px;border-bottom:1px solid var(--bd);background:var(--s)}

  .btn-main{
    width:100%;padding:13px;border-radius:10px;cursor:pointer;
    font-family:var(--sans);font-size:14px;font-weight:700;border:none;
    background:linear-gradient(135deg,var(--ac),#0055ff);color:#000;
    display:flex;align-items:center;justify-content:center;gap:8px;
    transition:all .2s}
  .btn-main:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,212,255,.35)}
  .btn-main:active{transform:none}
  .btn-main:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

  .url-box{margin-top:10px;display:none}
  .url-box.show{display:block}
  .url-label{font-size:10px;color:var(--dim);text-transform:uppercase;
    letter-spacing:.7px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
  .url-field{
    width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:7px;
    padding:8px 10px;color:var(--ac);font-family:var(--mono);font-size:10px;
    resize:none;outline:none;line-height:1.5;height:64px;word-break:break-all}
  .url-field:focus{border-color:var(--ac)}
  .url-actions{display:flex;gap:6px;margin-top:6px}
  .btn-sm{
    flex:1;padding:7px 10px;border-radius:7px;cursor:pointer;
    font-family:var(--sans);font-size:11px;font-weight:600;
    border:1px solid transparent;transition:all .2s;
    display:flex;align-items:center;justify-content:center;gap:5px}
  .btn-open{background:linear-gradient(135deg,var(--ac),#0077ff);color:#000;border:none}
  .btn-open:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,212,255,.3)}
  .btn-copy{background:transparent;border-color:var(--bd);color:var(--dim)}
  .btn-copy:hover{border-color:var(--g2);color:var(--g2)}
  .btn-regen{background:transparent;border-color:rgba(245,158,11,.3);color:var(--g3)}
  .btn-regen:hover{border-color:var(--g3);background:rgba(245,158,11,.08)}

  .steps{display:flex;gap:0;margin-top:10px;border-radius:7px;overflow:hidden;border:1px solid var(--bd)}
  .step{flex:1;padding:5px 2px;text-align:center;font-size:9px;color:var(--dim);
    background:var(--s2);border-right:1px solid var(--bd);transition:all .3s;line-height:1.5}
  .step:last-child{border-right:none}
  .step.active{background:rgba(0,212,255,.1);color:var(--ac);font-weight:600}
  .step.done{background:rgba(16,185,129,.1);color:var(--g2)}

  .waiting-hint{
    margin-top:10px;padding:8px 12px;
    background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.2);
    border-radius:7px;font-size:11px;color:var(--dim);display:none;
    align-items:center;gap:8px}
  .waiting-hint.show{display:flex}
  .spin{width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--ac);
    border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
  @keyframes sp{to{transform:rotate(360deg)}}

  .tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--s)}
  .tab{flex:1;padding:9px;text-align:center;cursor:pointer;font-size:12px;font-weight:500;
    color:var(--dim);border-bottom:2px solid transparent;transition:all .2s}
  .tab.active{color:var(--ac);border-bottom-color:var(--ac);background:rgba(0,212,255,.05)}
  .tab:hover:not(.active){color:var(--tx);background:rgba(255,255,255,.03)}
  .panel{display:none}.panel.active{display:block}

  .tlist{max-height:270px;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px}
  .tlist::-webkit-scrollbar{width:4px}
  .tlist::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
  .empty{padding:28px 20px;text-align:center;color:var(--dim)}
  .ei{font-size:28px;margin-bottom:8px;opacity:.5}
  .et{font-size:11px;line-height:1.7}

  .tcard{background:var(--s);border:1px solid var(--bd);border-radius:8px;overflow:hidden;transition:border-color .2s}
  .tcard:hover{border-color:rgba(0,212,255,.3)}
  .thead{display:flex;align-items:center;gap:7px;padding:8px 10px;
    background:var(--s2);border-bottom:1px solid var(--bd);cursor:pointer}
  .tnum{width:17px;height:17px;background:linear-gradient(135deg,var(--ac),#0077ff);
    border-radius:4px;display:flex;align-items:center;justify-content:center;
    font-size:9px;font-weight:700;color:#000;flex-shrink:0}
  .tmeta{flex:1;min-width:0}
  .ttime{font-size:10px;color:var(--dim);font-family:var(--mono)}
  .tsrc{font-size:9px;color:var(--ac);font-family:var(--mono)}
  .tact{display:flex;gap:4px}
  .bi{width:24px;height:24px;border:1px solid var(--bd);background:transparent;
    border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:11px;transition:all .2s;color:var(--dim)}
  .bi:hover{border-color:var(--ac);color:var(--ac);background:var(--glow)}

  .tfields{padding:8px 10px;display:flex;flex-direction:column;gap:6px}
  .frow{display:flex;flex-direction:column;gap:2px}
  .flbl{font-size:9px;font-weight:600;color:var(--dim);text-transform:uppercase;
    letter-spacing:.8px;display:flex;align-items:center;gap:4px}
  .tag{font-size:8px;padding:1px 4px;border-radius:3px;font-weight:400;text-transform:none;letter-spacing:0}
  .tg{background:rgba(16,185,129,.15);color:var(--g2);border:1px solid rgba(16,185,129,.3)}
  .tb{background:rgba(0,212,255,.15);color:var(--ac);border:1px solid rgba(0,212,255,.3)}
  .ta{background:rgba(245,158,11,.15);color:var(--g3);border:1px solid rgba(245,158,11,.3)}
  .fval{font-family:var(--mono);font-size:10px;color:var(--tx);background:var(--bg);
    border:1px solid var(--bd);border-radius:4px;padding:5px 7px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:border-color .2s}
  .fval:hover{border-color:var(--ac)}
  .fval.cp{border-color:var(--g2)!important}
  .fval.ex{white-space:normal;word-break:break-all}
  .etg{font-size:9px;color:var(--ac);cursor:pointer;padding:1px 5px;border-radius:3px;
    background:var(--glow);border:1px solid rgba(0,212,255,.2);margin-left:auto}
  .spills{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}
  .sp{font-size:9px;font-family:var(--mono);padding:1px 6px;border-radius:3px;
    background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);color:var(--ac)}

  .exbar{padding:9px 11px;border-top:1px solid var(--bd);display:flex;gap:6px;background:var(--s)}
  .btn{flex:1;padding:8px 10px;border-radius:7px;cursor:pointer;font-family:var(--sans);
    font-size:11px;font-weight:600;border:1px solid transparent;transition:all .2s;
    display:flex;align-items:center;justify-content:center;gap:5px}
  .bp{background:linear-gradient(135deg,var(--ac),#0077ff);color:#000;font-weight:700}
  .bp:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(0,212,255,.3)}
  .bs{background:transparent;border-color:var(--bd);color:var(--dim)}
  .bs:hover{border-color:var(--g2);color:var(--g2)}
  .bd2{background:transparent;border-color:rgba(239,68,68,.3);color:var(--er)}
  .bd2:hover{background:rgba(239,68,68,.1)}
  .btn-row{display:flex;gap:8px;margin-bottom:8px}
  .btn-row .btn{flex:1}

  .mpanel{padding:12px 11px}
  .fgrp{margin-bottom:10px}
  .flbl2{display:block;font-size:10px;font-weight:600;color:var(--dim);
    text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
  .finp{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:6px;
    padding:7px 9px;color:var(--tx);font-family:var(--mono);font-size:11px;
    outline:none;transition:border-color .2s;resize:vertical;min-height:32px}
  .finp:focus{border-color:var(--ac)}
  .finp::placeholder{color:var(--dim)}
  .pending-box{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);
    border-radius:7px;padding:9px 11px;margin-bottom:11px}
  .pending-lbl{font-size:10px;color:var(--g3);font-weight:600;margin-bottom:5px;
    text-transform:uppercase;letter-spacing:.5px}
  .pending-val{font-family:var(--mono);font-size:10px;color:var(--tx);
    background:var(--bg);border:1px solid var(--bd);border-radius:4px;
    padding:5px 7px;word-break:break-all;cursor:pointer}
  .pending-val:hover{border-color:var(--g3)}

  .toast{position:fixed;bottom:14px;left:50%;
    transform:translateX(-50%) translateY(60px);
    background:var(--s2);border:1px solid var(--g2);color:var(--g2);
    padding:7px 16px;border-radius:20px;font-size:11px;font-family:var(--mono);
    z-index:1000;transition:transform .3s;white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="hdr-row">
      <div class="logo">OAI</div>
      <span class="ttl">OpenAI Token Interceptor</span>
      <div class="badge"><div class="dot"></div><span id="statusTxt">就绪</span></div>
    </div>
    <div class="sub">by LinuxDo Justinbiber &middot; PKCE OAuth &middot; localhost:1455/auth/callback</div>
  </div>

  <div class="auth-wrap">

    <button class="btn-main" id="btnStartAuth">
      <span id="authBtnIcon">[+]</span>
      <span id="authBtnText">生成授权 URL 并打开</span>
    </button>

    <div class="url-box" id="urlBox">
      <div class="url-label">授权 URL <span id="urlStatus">（已生成，可直接打开或复制）</span></div>
      <textarea class="url-field" id="urlField" readonly></textarea>
      <div class="url-actions">
        <button class="btn-sm btn-open" id="btnOpenURL">打开此 URL</button>
        <button class="btn-sm btn-copy" id="btnCopyURL">复制 URL</button>
        <button class="btn-sm btn-regen" id="btnRegen">重新生成</button>
      </div>
    </div>

    <div class="waiting-hint" id="waitingHint">
      <div class="spin"></div>
      <span>等待 OpenAI 授权回调... 完成登录后 Token 将自动捕获</span>
    </div>

    <div class="steps" style="margin-top:10px">
      <div class="step" id="step1">1. 生成 PKCE</div>
      <div class="step" id="step2">2. 打开授权页</div>
      <div class="step" id="step3">3. 等待回调</div>
      <div class="step" id="step4">4. 换取 Token</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="tokens">已保存 (<span id="tokenCount">0</span>)</div>
    <div class="tab" data-tab="manual">手动换取</div>
    <div class="tab" data-tab="invite">跳验证码授权</div>
  </div>

  <div id="panel-tokens" class="panel active">
    <div class="tlist" id="tokenList">
      <div style="padding:20px;text-align:center;color:var(--dim);font-size:12px">加载中...</div>
    </div>
    <div class="exbar">
      <button class="btn bp" id="btnExportAll">导出全部 TXT</button>
      <button class="btn bs" id="btnExportJSON">导出 JSON</button>
      <button class="btn bd2" id="btnClear" style="flex:0;padding:8px 12px">清除</button>
    </div>
  </div>

  <div id="panel-manual" class="panel">
    <div class="mpanel">
      <div id="pendingBox" style="display:none" class="pending-box">
        <div class="pending-lbl">[!] 已捕获待重试的授权码</div>
        <div class="pending-val" id="pendingVal" onclick="copyPending()">-</div>
      </div>
      <div class="fgrp">
        <label class="flbl2">Authorization Code <span style="color:var(--er)">*</span></label>
        <textarea class="finp" id="inCode" rows="3" placeholder="ac_o21-..."></textarea>
      </div>
      <div class="fgrp">
        <label class="flbl2">Code Verifier <span style="color:var(--er)">*</span></label>
        <textarea class="finp" id="inVerifier" rows="2" placeholder="插件自动填入，或手动粘贴"></textarea>
      </div>
      <div class="fgrp">
        <label class="flbl2">Client ID</label>
        <input class="finp" id="inClientId" value="app_EMoamEEZ73f0CkXaXp7hrann">
      </div>
      <div class="fgrp">
        <label class="flbl2">Redirect URI</label>
        <input class="finp" id="inRedirect" value="http://localhost:1455/auth/callback">
      </div>
      <button class="btn bp" id="btnManual" style="width:100%">手动换取 Token</button>
    </div>
  </div>

  <div id="panel-invite" class="panel">
    <div class="mpanel">

      <div class="fgrp">
        <label class="flbl2">Server URL</label>
        <input class="finp" id="invServerUrl" value="https://cuongthonggio.qzz.io" placeholder="https://cuongthonggio.qzz.io">
      </div>

      <div id="linuxDoStatus" style="font-size:11px;margin-bottom:8px;color:var(--dim)">
        LinuxDo登录: 检查中...
      </div>

      <div class="btn-row">
        <button class="btn bp" id="btnLinuxDoLogin">LinuxDo登录</button>
        <button class="btn bs" id="btnLinuxDoLogout">退出登录</button>
      </div>

      <div class="fgrp">
        <label class="flbl2">Legacy API Key（兼容旧方式，可留空）</label>
        <input class="finp" id="invApiKey" type="password" value="" placeholder="已登录 LinuxDo时无需填写 API Key">
      </div>

      <div id="invServerStatus" style="font-size:10px;margin-bottom:6px;color:var(--dim)">Server: -</div>
      <div id="invActiveStatus" style="font-size:10px;margin-bottom:8px;color:var(--g3);display:none">
        邀请模式已激活，等待 phone-otp 自动检测...
      </div>

      <button class="btn bp" id="btnInviteStart" style="width:100%;margin-bottom:8px">
        启动 Token 交换
      </button>
      <div class="btn-row">
        <button class="btn bs" id="btnInviteSaveCfg">保存配置</button>
        <button class="btn bs" id="btnInviteTestConn">测试连接</button>
      </div>
      <button class="btn bs" id="btnInviteCancel" style="width:100%;margin-top:4px;display:none">
        取消
      </button>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>
<script src="popup.js"></script>
</body>
</html>
