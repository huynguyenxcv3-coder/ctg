<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>OAuth 回调处理中...</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a0e1a;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', sans-serif; color: #e2e8f0;
  }
  .card {
    background: #111827; border: 1px solid #1e3a5f;
    border-radius: 16px; padding: 40px 48px;
    text-align: center; max-width: 460px; width: 90%;
    box-shadow: 0 0 40px rgba(0,212,255,0.08);
  }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h2 { font-size: 20px; font-weight: 600; margin-bottom: 10px; color: #f1f5f9; }
  p  { font-size: 13px; color: #64748b; line-height: 1.6; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #1e3a5f; border-top-color: #00d4ff;
    border-radius: 50%; animation: spin .7s linear infinite;
    margin: 20px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ok  { color: #10b981; }
  .err { color: #ef4444; }
  .detail {
    font-family: monospace; font-size: 11px; color: #64748b;
    background: #0a0e1a; border: 1px solid #1e3a5f;
    border-radius: 6px; padding: 10px; margin-top: 14px;
    word-break: break-all; text-align: left;
  }
  .btn {
    display: inline-block; margin-top: 20px;
    padding: 10px 28px; background: linear-gradient(135deg,#00d4ff,#0077ff);
    color: #000; font-weight: 700; border-radius: 20px;
    cursor: pointer; font-size: 13px; border: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon" id="ico">[ ]</div>
  <h2 id="title">正在处理授权回调...</h2>
  <div class="spinner" id="spin"></div>
  <p id="msg">已拦截 OpenAI OAuth 回调，正在提取授权码并换取 Token...</p>
  <div class="detail" id="detail" style="display:none"></div>
</div>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const code  = params.get('code');
  const error = params.get('error');
  const ico   = document.getElementById('ico');
  const title = document.getElementById('title');
  const spin  = document.getElementById('spin');
  const msg   = document.getElementById('msg');
  const det   = document.getElementById('detail');

  function done(ok, t, m, d) {
    spin.style.display = 'none';
    ico.textContent = ok ? '[OK]' : '[X]';
    title.textContent = t;
    title.className = ok ? 'ok' : 'err';
    msg.textContent = m;
    if (d) { det.style.display = 'block'; det.textContent = d; }
    if (ok) {
      setTimeout(() => {
        const b = document.createElement('button');
        b.className = 'btn'; b.textContent = '关闭此页面';
        b.onclick = () => window.close();
        document.querySelector('.card').appendChild(b);
      }, 800);
    }
  }

  if (error) {
    done(false, '授权失败', '用户拒绝或发生错误：' + error);
    return;
  }
  if (!code) {
    done(false, '回调参数缺失', 'URL 中没有找到 code 参数');
    return;
  }

  chrome.runtime.sendMessage({ type: 'CALLBACK_CODE', code }, resp => {
    if (chrome.runtime.lastError) {
      done(false, '通信失败', chrome.runtime.lastError.message);
      return;
    }
    if (resp && resp.ok) {
      done(true, 'Token 获取成功！', '凭证已保存，点击插件图标可查看并导出');
    } else {
      done(false, 'Token 换取失败', resp?.error || '未知错误', '如需重试：复制下方授权码到插件「手动获取」页\n\n' + code);
    }
  });
})();
</script>
</body>
</html>
